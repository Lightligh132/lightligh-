<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AI Helper</title>
    <style>
      * {
        box-sizing: border-box;
        scrollbar-width: none;
      }

      *::-webkit-scrollbar {
        display: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden !important;
        overscroll-behavior: none;
        background: #050814;
      }

      body {
        border: 1px solid rgba(255, 165, 0, 0.2);
        touch-action: none;
      }

      #agent-scale-host {
        --agent-scale: 0.88;
        width: calc(100% / var(--agent-scale));
        height: calc(100% / var(--agent-scale));
        overflow: hidden;
        transform: scale(var(--agent-scale));
        transform-origin: left top;
      }

      #agent-scale-host > * {
        max-width: none;
      }
    </style>
  </head>
  <body>
    <div id="agent-scale-host"></div>
    <script src="https://agi-dev-platform-web.cdn.bcebos.com/ai_apaas/embed/output/embedFullSDK.js?responseExpires=0&t=1779503604078"></script>
    <script>
      const encodeKey = 'ZW1iZWRCSFBncHNtN29jeEVrSHlpMmpMcA==';
      const realCode = atob(encodeKey);
      const host = document.getElementById('agent-scale-host');
      const moveIntoHost = (node) => {
        if (node.nodeType === Node.ELEMENT_NODE && node !== host && node.tagName !== 'SCRIPT') {
          host.appendChild(node);
        }
      };

      new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach(moveIntoHost);
        });
      }).observe(document.body, { childList: true });

      window.addEventListener(
        'wheel',
        (event) => {
          event.preventDefault();
        },
        { passive: false, capture: true }
      );

      window.addEventListener(
        'touchmove',
        (event) => {
          event.preventDefault();
        },
        { passive: false, capture: true }
      );

      new EmbedWebSDK({
        appId: 'c22d3b92-c974-4c53-9a73-a51c69c8ea83',
        code: realCode,
        container: host,
        renderConfig: { width: '100%', height: '100%' }
      });
    </script>
  </body>
</html>
